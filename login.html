<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    
     <div class="login-container">
        <h2>Entrar na Conta</h2>
        <p class="subtitle">Seja bem-vindo de volta! Insira seus dados.</p>

        <form>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox"> Lembrar-me
                </label>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-login">Acessar</button>
        </form>
        
        <div id="messagem" class="messagem"></div>
    </div> 


    <script src="js/login.js"></script>
</body>
</html>
